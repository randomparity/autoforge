# Shared runner settings (tracked in git).
# System-specific overrides: runner.local.toml (gitignored).
# Supports ${VAR} for env vars and ${REPO_ROOT} for repo-relative paths.

[runner]
phase = "all"
log_level = "info"
poll_interval = 30

[paths]
source_dir = "${REPO_ROOT}/projects/vllm/repo"
# Build artifacts directory — ramdisk for faster builds
build_dir = "/mnt/ramdisk/vllm-build"

[timeouts]
build_minutes = 60
test_minutes = 30
